<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscriber Battle</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:2.3rem;
margin-bottom:10px;
color:#ff0000;
}

.search-box{
max-width:700px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

.inputs{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
margin-top:10px;
padding:12px;
background:red;
color:white;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.battle{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:#1e293b;
padding:20px;
width:300px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
border:3px solid red;
margin-bottom:10px;
}

.name{
font-size:24px;
margin-bottom:10px;
}

.count{
font-size:40px;
font-weight:bold;
color:#00ff99;
}

.vs{
font-size:50px;
font-weight:bold;
color:gold;
}

.winner{
font-size:35px;
margin-top:10px;
}

.progress{
height:15px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:15px;
}

.progress-bar{
height:100%;
width:50%;
background:lime;
}
</style>
</head>

<body>

<h1>🔥 Subscriber Battle</h1>

<div class="search-box">
<div class="inputs">
<input type="text" id="name1Input" placeholder="Channel 1 Name">
<input type="text" id="name2Input" placeholder="Channel 2 Name">
</div>

<button onclick="startBattle()">Start Battle ⚔️</button>
</div>

<div class="battle">

<div class="card">
<img src="https://i.pravatar.cc/150?img=12" class="avatar">

<div class="name" id="name1">Channel 1</div>

<div class="count" id="count1">0</div>

<div class="winner" id="crown1"></div>

<div class="progress">
<div class="progress-bar" id="bar1"></div>
</div>
</div>

<div class="vs">VS</div>

<div class="card">
<img src="https://i.pravatar.cc/150?img=22" class="avatar">

<div class="name" id="name2">Channel 2</div>

<div class="count" id="count2">0</div>

<div class="winner" id="crown2"></div>

<div class="progress">
<div class="progress-bar" id="bar2"></div>
</div>
</div>

</div>

<script>

let subs1=0;
let subs2=0;
let interval;

function startBattle(){

clearInterval(interval);

document.getElementById("name1").innerText =
document.getElementById("name1Input").value || "Channel 1";

document.getElementById("name2").innerText =
document.getElementById("name2Input").value || "Channel 2";

subs1=Math.floor(Math.random()*50000000)+1000000;
subs2=Math.floor(Math.random()*50000000)+1000000;

updateUI();

interval=setInterval(()=>{

subs1+=Math.floor(Math.random()*20)+1;
subs2+=Math.floor(Math.random()*20)+1;

updateUI();

},1000);

}

function updateUI(){

document.getElementById("count1").innerText=
subs1.toLocaleString();

document.getElementById("count2").innerText=
subs2.toLocaleString();

let total=subs1+subs2;

let p1=(subs1/total)*100;
let p2=(subs2/total)*100;

document.getElementById("bar1").style.width=p1+"%";
document.getElementById("bar2").style.width=p2+"%";

if(subs1>subs2){
document.getElementById("crown1").innerHTML="👑";
document.getElementById("crown2").innerHTML="";
}
else if(subs2>subs1){
document.getElementById("crown2").innerHTML="👑";
document.getElementById("crown1").innerHTML="";
}
}

</script>

</body>
</html>
