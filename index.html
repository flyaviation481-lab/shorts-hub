<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBeast vs Ronaldo Live Subscriber Battle</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#ff3b3b;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
    margin-top:50px;
}

.card{
    width:350px;
    background:#1b1b1b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(255,255,255,.08);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #ff0000;
}

.name{
    font-size:30px;
    margin-top:15px;
    font-weight:bold;
}

.count{
    font-size:60px;
    font-weight:900;
    color:#00ff99;
    margin-top:20px;
    font-family:monospace;
}

.vs{
    font-size:70px;
    color:gold;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>🔥 LIVE SUBSCRIBER BATTLE 🔥</h1>

<div class="container">

<div class="card">
    <img id="logo1" class="avatar">
    <div id="name1" class="name">MrBeast</div>
    <div id="count1" class="count">Loading...</div>
</div>

<div class="vs">VS</div>

<div class="card">
    <img id="logo2" class="avatar">
    <div id="name2" class="name">Cristiano Ronaldo</div>
    <div id="count2" class="count">Loading...</div>
</div>

</div>

<script>

const API_KEY = "AIzaSyD8sY8gsqkgX9c20tWywdWSMzFxniH0LP4";

const CHANNEL_1 = "UCX6OQ3DkcsbYNE6H8uQQuVA"; // MrBeast
const CHANNEL_2 = "UCm78GgA7Z-r2XUor_V78V6w"; // Ronaldo

let display1 = 0;
let display2 = 0;

async function getChannelData(channelId){

    const url =
    `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    return data.items[0];
}

function animateValue(element,target,current){

    const step = Math.ceil((target-current)/10);

    if(current < target){
        current += step;
    }else{
        current = target;
    }

    element.innerText = current.toLocaleString();

    return current;
}

async function updateSubscribers(){

    try{

        const ch1 = await getChannelData(CHANNEL_1);
        const ch2 = await getChannelData(CHANNEL_2);

        document.getElementById("name1").innerText =
        ch1.snippet.title;

        document.getElementById("name2").innerText =
        ch2.snippet.title;

        document.getElementById("logo1").src =
        ch1.snippet.thumbnails.high.url;

        document.getElementById("logo2").src =
        ch2.snippet.thumbnails.high.url;

        const target1 =
        Number(ch1.statistics.subscriberCount);

        const target2 =
        Number(ch2.statistics.subscriberCount);

        display1 = animateValue(
            document.getElementById("count1"),
            target1,
            display1
        );

        display2 = animateValue(
            document.getElementById("count2"),
            target2,
            display2
        );

    }catch(error){
        console.log(error);
    }
}

updateSubscribers();

/* refresh every 10 sec */
setInterval(updateSubscribers,10000);

</script>

</body>
</html>
